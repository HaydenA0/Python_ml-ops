stages:
  train:
    cmd: python -m python.train
    deps:
      - python/train.py
      - python/ml_pipeline.py
      - data/PCXP/train
      - data/PCXP/test
    outs:
      - models/model.pth:
          cache: true
  evaluate:
    cmd: python -m python.evaluate
    deps:
      - python/ml_pipeline.py
      - data/PCXP/test
      - models/model.pth
